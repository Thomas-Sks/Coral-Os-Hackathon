# AuditMesh front-door reverse proxy.
#
# Two jobs:
#   1. Serve the domain-control authorization token at
#        GET /.well-known/auditmesh-authz.txt
#      from a file mounted at /etc/auditmesh/auditmesh-authz.txt. Juice Shop cannot
#      serve arbitrary /.well-known paths, so the token lives here on the front-door.
#   2. Reverse-proxy everything else to the Juice Shop container (juice-shop:3000),
#      including socket.io websocket upgrades.
#
# This file is mounted at /etc/nginx/conf.d/default.conf (read-only) by
# docker-compose.target.yml.

upstream juice_shop {
    server juice-shop:3000;
}

server {
    listen 80;
    server_name _;

    # Domain-control token. Served straight from the mounted file with a
    # text/plain content type and no caching so the demo nonce is always fresh.
    # A missing file yields a clean 404 (error_page below normalizes it).
    location = /.well-known/auditmesh-authz.txt {
        alias /etc/auditmesh/auditmesh-authz.txt;
        # Empty types map + default_type forces text/plain and avoids emitting a
        # duplicate Content-Type header.
        types { }
        default_type text/plain;
        add_header Cache-Control "no-cache" always;
        error_page 404 = @token_missing;
    }

    location @token_missing {
        default_type text/plain;
        return 404 "auditmesh-authz token not provisioned\n";
    }

    # Everything else proxies to Juice Shop.
    location / {
        proxy_pass http://juice_shop;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Websocket / socket.io upgrade support.
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Generous timeouts — Juice Shop can be slow to boot and holds long-lived
        # socket.io connections.
        proxy_connect_timeout 60s;
        proxy_send_timeout    600s;
        proxy_read_timeout    600s;
    }
}

# Map the Upgrade header to the correct Connection value: "upgrade" when a
# websocket handshake is present, empty (so the connection can be pooled)
# otherwise.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
