# Agent manifest — coral-server reads this to discover, launch, and configure the AuditMesh buyer.
# Docs: https://docs.coralos.ai/reference/agent · whole-kit walkthrough /CORAL.md
edition = 4

[agent]
name = "audit-buyer"
version = "0.1.0"
description = "AuditMesh marketplace buyer. Broadcasts an `audit` WANT with a requested scope + budget, picks the best-value seller, proves control of the target and signs a scoped authorization, binds the escrow to that authorization, and — on a valid delivered report — decides to pay and releases on devnet."
summary = "The buyer that reasons about value, enforces on-chain consent, and names the decision-to-pay."
readme = "WANT(service=audit)->collect BIDs->AWARD best value->issue signed scoped AUTHZ_GRANT->wait ESCROW_REQUIRED (assert reference bound to the authz hash)->deposit->DEPOSITED->wait DELIVERED->evaluate report (DECISION-TO-PAY)->release. No-show/invalid report ⇒ funds refund after the deadline."

[agent.license]
type = "spdx"
expression = "MIT"

[options]
AGENT_NAME = { type = "string", default = "audit-buyer", description = "Market identity for the buyer" }
BUYER_KEYPAIR_B58 = { type = "string", description = "Buyer devnet secret (base58) — signs the escrow deposit/release AND the authorization payload" }
ARBITER_KEYPAIR_B58 = { type = "string", default = "", description = "Neutral arbiter secret (base58) — gates release/refund when SETTLEMENT_MODE=arbiter" }
SELLER_WALLET = { type = "string", default = "", description = "Expected payout wallet — the buyer refuses to deposit to a mismatched ESCROW_REQUIRED (binds the award to the payout)" }
BUYER_MAX_SOL = { type = "f64", default = 0.02, description = "Budget ceiling per audit (code-enforced upper bound on bids)" }
AUDIT_TARGET = { type = "string", default = "http://target-frontdoor", description = "The allowlisted target origin to assess (the bundled Juice Shop front-door)" }
AUTHZ_NONCE = { type = "string", default = "", description = "The domain-control token published at <target>/.well-known/auditmesh-authz.txt (the harness generates + publishes it)" }
AUDIT_SCOPES = { type = "string", default = "hdr+tls,hdr+tls+xss+inj+ac+data,hdr+tls+xss", description = "csv of per-round requested scopes (short codes joined by +); rotated so rounds differ and different personas win" }
AUDIT_EXCLUSIONS = { type = "string", default = "/#/administration", description = "csv of paths the grant forbids (honored as Strix exclusions)" }
AUDIT_DEPTH = { type = "f64", default = 3, description = "Requested assessment depth (1 surface .. 5 thorough)" }
AUTHZ_TTL_SECS = { type = "f64", default = 1800, description = "Authorization lifetime in seconds" }
MARKET_SELLERS = { type = "string", default = "audit-discounter,audit-tls-specialist,audit-premium", description = "csv of seller persona names in the session" }
BID_WINDOW_MS = { type = "f64", default = 5000, description = "How long to collect competing bids" }
CYCLE_INTERVAL_MS = { type = "f64", default = 30000, description = "Pause between market rounds" }
SETTLEMENT_MODE = { type = "string", default = "arbiter", description = "arbiter (default) | direct legacy base escrow" }
SOLANA_RPC_URL = { type = "string", default = "", description = "Solana RPC URL (devnet)" }
ANTHROPIC_API_KEY = { type = "string", default = "", description = "Anthropic key for the buyer's value-reasoning LLM" }
OPENAI_API_KEY = { type = "string", default = "", description = "OpenAI key; set LLM_PROVIDER=openai to use it" }
VENICE_API_KEY = { type = "string", default = "", description = "Venice AI key (OpenAI-compatible, free credits); set LLM_PROVIDER=venice to use it" }
DEEPSEEK_API_KEY = { type = "string", default = "", description = "DeepSeek key (OpenAI-compatible); set LLM_PROVIDER=deepseek to use it for value reasoning" }
LLM_PROVIDER = { type = "string", default = "", description = "anthropic (default) | openai | venice | deepseek" }
LLM_MODEL = { type = "string", default = "", description = "Override the buyer's LLM model id" }
TRACE = { type = "string", default = "", description = "Set to 1 to log market + consent + settlement steps with Explorer links" }

DELIVERED_WAIT_MS = { type = "f64", default = 1200000, description = "How long the buyer waits for DELIVERED (live per-round scans take minutes)" }

[runtimes.docker]
image = "audit-buyer:0.1.0"
